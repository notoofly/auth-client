openapi: 3.0.3
info:
  title: Eioz Auth API
  description: API description by openapi
  version: 1.0.0
  license:
    name: Proprietary – Read Only
    url: https://example.com/terms
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login/refresh/verify endpoints
    preAuth:
      type: http
      scheme: preAuth
      bearerFormat: JWT
      description: JWT token obtained from otp send/totp send/signup/signin endpoints
    refreshAuth:
      type: http
      scheme: refreshAuth
      bearerFormat: UUID
      description: UUID token obtained from otp verify otp/verify account/signin endpoints
  schemas: {}
paths:
  /v1/token/refresh:
    post:
      security:
        - bearerAuth: []
      description: Rotate refresh token and issue new access token for session continuation.
      summary: POST /token/refresh - rotate refresh token
      parameters:
        - name: cf-connection-ip
          in: header
          required: false
          schema:
            description: IP asli dari Cloudflare
            format: ipv4
            maxLength: 40
            minLength: 3
            type: string
        - name: x-forwarded-for
          in: header
          required: false
          schema:
            description: List IP dari proxy/load balancer
            maxLength: 40
            minLength: 3
            type: string
        - name: x-real-ip
          in: header
          required: false
          schema:
            description: IP asli dari reverse proxy (Nginx/Apache)
            maxLength: 40
            minLength: 3
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            minLength: 3
            maxLength: 512
            type: string
        - name: deviceId
          in: cookie
          required: true
          schema:
            minLength: 36
            maxLength: 70
            type: string
        - name: refreshToken
          in: cookie
          required: true
          schema:
            minLength: 32
            maxLength: 2048
            type: string
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - meta
                properties:
                  success:
                    const: true
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    required:
                      - accessToken
                    properties:
                      accessToken:
                        minLength: 20
                        maxLength: 1024
                        type: string
                  meta:
                    type: object
                    required:
                      - requestId
                      - timestamp
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "400":
          description: Response for status 400
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                  - meta
                properties:
                  success:
                    const: false
                    type: boolean
                  error:
                    additionalProperties: true
                    type: object
                    required:
                      - code
                    properties:
                      code:
                        type: string
                        enum:
                          - SYSTEM.CORE.ERROR
                          - DB.CORE.VALIDATION_ERROR
                          - DB.CONNECTION.FAILED
                          - DB.CORE.TIMEOUT
                          - DB.CONSTRAINT.DUPLICATE
                          - DB.CORE.NOT_FOUND
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          required:
                            - reason
                          properties:
                            field:
                              type: string
                            reason:
                              type: string
                  meta:
                    type: object
                    required:
                      - requestId
                      - timestamp
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "401":
          description: Response for status 401
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                  - meta
                properties:
                  success:
                    const: false
                    type: boolean
                  error:
                    additionalProperties: true
                    type: object
                    required:
                      - code
                    properties:
                      code:
                        type: string
                        enum:
                          - TOKEN.REFRESH.INVALID
                          - TOKEN.REFRESH.REPLAYED
                          - DEVICE.CORE.LIMIT_REACHED
                          - DEVICE.CORE.REGISTERED
                          - AUTH.ACCESS.DENIED
                          - SECURITY.CSRF.MISSING
                          - SECURITY.CSRF.INVALID
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          required:
                            - reason
                          properties:
                            field:
                              type: string
                            reason:
                              type: string
                  meta:
                    type: object
                    required:
                      - requestId
                      - timestamp
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "404":
          description: Response for status 404
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                  - meta
                properties:
                  success:
                    const: false
                    type: boolean
                  error:
                    additionalProperties: true
                    type: object
                    required:
                      - code
                    properties:
                      code:
                        type: string
                        enum:
                          - SYSTEM.CORE.ERROR
                          - DB.CORE.VALIDATION_ERROR
                          - DB.CONNECTION.FAILED
                          - DB.CORE.TIMEOUT
                          - DB.CONSTRAINT.DUPLICATE
                          - DB.CORE.NOT_FOUND
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          required:
                            - reason
                          properties:
                            field:
                              type: string
                            reason:
                              type: string
                  meta:
                    type: object
                    required:
                      - requestId
                      - timestamp
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "409":
          description: Response for status 409
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                  - meta
                properties:
                  success:
                    const: false
                    type: boolean
                  error:
                    additionalProperties: true
                    type: object
                    required:
                      - code
                    properties:
                      code:
                        type: string
                        enum:
                          - SYSTEM.CORE.ERROR
                          - DB.CORE.VALIDATION_ERROR
                          - DB.CONNECTION.FAILED
                          - DB.CORE.TIMEOUT
                          - DB.CONSTRAINT.DUPLICATE
                          - DB.CORE.NOT_FOUND
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          required:
