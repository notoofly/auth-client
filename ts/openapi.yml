  /v1/token/refresh-token:
    post:
      security:
        - refreshAuth: []
      description: Check refresh token
      summary: POST /token/refresh-token - check refresh token
      parameters:
        - name: deviceId
          in: cookie
          required: true
          schema:
            minLength: 36
            maxLength: 70
            type: string
        - name: refreshToken
          in: cookie
          required: true
          schema:
            minLength: 32
            maxLength: 2048
            type: string
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - active
                properties:
                  active:
                    const: true
                    type: boolean
        "401":
          description: Response for status 401
          content:
            application/json:
              schema:
                type: object
                required:
                  - active
                properties:
                  active:
                    const: false
                    type: boolean
      operationId: postV1TokenRefresh-token
  /v1/token/introspesction:
    post:
      security: []
      description: Verify access token and giving all accessToken payload
      summary: POST /v1/token/introspesction - verification access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  minLength: 20
                  maxLength: 1024
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  minLength: 20
                  maxLength: 1024
                  type: string
          multipart/form-data:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  minLength: 20
                  maxLength: 1024
                  type: string
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - active
                  - email
                  - role
                  - perm
                  - exp
                  - aud
                  - iss
                  - sub
                  - verified
                properties:
                  active:
                    const: true
                    type: boolean
                  email:
                    type: string
                  role:
                    type: string
                  perm:
                    type: array
                    items:
                      type: string
                  exp:
                    type: number
                  aud:
                    type: string
                  iss:
                    type: string
                  sub:
                    type: string
                  verified:
                    type: boolean
        "401":
          description: Response for status 401
          content:
            application/json:
              schema:
                type: object
                required:
                  - active
                properties:
                  active:
                    const: false
                    type: boolean
      operationId: postV1TokenIntrospesction
  /v1/csrf:
    get:
