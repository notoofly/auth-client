      operationId: getV1Csrf
  /v1/auth/signup:
    post:
      security: []
      description: Register new user account with email and password credentials.
      summary: POST /signup - register new user
      parameters:
        - name: cf-connection-ip
          in: header
          required: false
          schema:
            description: IP asli dari Cloudflare
            format: ipv4
            maxLength: 40
            minLength: 3
            type: string
        - name: x-forwarded-for
          in: header
          required: false
          schema:
            description: List IP dari proxy/load balancer
            maxLength: 40
            minLength: 3
            type: string
        - name: x-real-ip
          in: header
          required: false
          schema:
            description: IP asli dari reverse proxy (Nginx/Apache)
            maxLength: 40
            minLength: 3
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            minLength: 3
            maxLength: 512
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              type: object
              properties:
                email:
                  type: string
                  minLength: 5
                  maxLength: 254
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                confirmPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
              required:
                - email
                - password
                - confirmPassword
          application/x-www-form-urlencoded:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              type: object
              properties:
                email:
                  type: string
                  minLength: 5
                  maxLength: 254
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                confirmPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
              required:
                - email
                - password
                - confirmPassword
          multipart/form-data:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              type: object
              properties:
                email:
                  type: string
                  minLength: 5
                  maxLength: 254
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                confirmPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
              required:
                - email
                - password
                - confirmPassword
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - meta
                properties:
                  success:
                    const: true
                    type: boolean
                  message:
                    type: string
                  data:
                    anyOf:
                      - type: object
                        required:
                          - code
                        properties:
                          code:
                            const: VERIFY.TOKEN.SENT
                            type: string
                      - type: object
                        required:
                          - code
                          - accessToken
                          - deviceId
                          - type
                        properties:
                          code:
                            const: USER.ACCOUNT.ACTIVATED
                            type: string
                          accessToken:
                            type: string
                          deviceId:
                            type: string
                          type:
                            const: Bearer
                            type: string
                  meta:
                    type: object
                    required:
                      - requestId
                      - timestamp
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "400":
          description: Response for status 400
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                  - meta
                properties:
                  success:
                    const: false
                    type: boolean
                  error:
                    additionalProperties: true
                    type: object
                    required:
                      - code
                    properties:
                      code:
                        type: string
                        enum:
                          - SYSTEM.CORE.ERROR
                          - DB.CORE.VALIDATION_ERROR
                          - DB.CONNECTION.FAILED
                          - DB.CORE.TIMEOUT
                          - DB.CONSTRAINT.DUPLICATE
                          - DB.CORE.NOT_FOUND
                      message:
