                        type: string
                        enum:
                          - AUTH.ACCESS.GRANTED
                          - AUTH.ACCESS.DENIED
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          required:
                            - reason
                          properties:
                            field:
                              type: string
                            reason:
                              type: string
                  meta:
